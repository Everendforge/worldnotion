specVersion: "0.1"
types:
  character:
    label: Character
    description: Person, creature, or viewpoint actor.
    properties:
      role:
        type: select
        options: [protagonist, ally, rival, antagonist]
      homeLocation:
        type: entityRef
  location:
    label: Location
    description: Place, region, settlement, or site.
    properties:
      climate:
        type: text
      governingOrganization:
        type: entityRef
  item:
    label: Item
    description: Portable object, relic, tool, artifact, or inventory-relevant entity.
    properties:
      rarity:
        type: select
        options: [common, rare, legendary]
      relatedCharacters:
        type: entityRefList
  organization:
    label: Organization
    description: Faction, institution, guild, house, or political body.
    properties:
      headquarters:
        type: entityRef
      relatedCharacters:
        type: entityRefList
  concept:
    label: Concept
    description: Rule, myth, system, abstract idea, or research note.
    properties:
      relatedEntities:
        type: entityRefList
  story:
    label: Story
    description: Narrative container for arcs and scenes.
  scene:
    label: Scene
    description: Narrative planning unit used by WorldNotion.
    properties:
      location:
        type: entityRef
      viewpointCharacter:
        type: entityRef
      draftStatus:
        type: select
        options: [outline, draft, revised, final]
